name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (uv, pytest, ruff)
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --group dev --frozen

      - name: Verify lockfile
        run: uv lock --check

      - name: Ruff format
        run: uv run ruff format --check server tempslide

      - name: Ruff lint
        run: uv run ruff check server tempslide

      - name: Test pptx_master
        run: uv run --directory server/libs/pptx_master pytest tests -q

      - name: Test db-service
        run: uv run --directory server/db-service pytest tests -q

      - name: Test backend
        run: uv run --directory server/backend pytest tests -q

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            client/app/package-lock.json
            client/admin/package-lock.json

      - name: npm ci (app)
        run: npm ci --prefix client/app

      - name: npm ci (admin)
        run: npm ci --prefix client/admin

      - name: Vitest app
        run: npm test --prefix client/app --silent

      - name: Vitest admin
        run: npm test --prefix client/admin --silent
